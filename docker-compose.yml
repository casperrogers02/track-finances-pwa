version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spendwise_db
    environment:
      POSTGRES_DB: spendwise_db
      POSTGRES_USER: spendwise_user
      POSTGRES_PASSWORD: 87654321
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise_user -d spendwise_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

