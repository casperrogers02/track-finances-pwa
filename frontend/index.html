<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise</title>
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="Smart financial tracking for Uganda">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192x192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c1d;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* ─────────────────────────────────────────
           SPLASH SCREEN  (full-screen)
        ───────────────────────────────────────── */
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 60%, #1a1040 0%, #0c0c1d 70%);
            z-index: 999;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        #splash.fade-out { opacity: 0; pointer-events: none; }

        /* Glowing background orb */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: pulse 4s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: min(500px, 70vw);
            height: min(500px, 70vw);
            background: rgba(99,102,241,0.18);
            top: -15%;
            left: -10%;
        }
        .orb-2 {
            width: min(400px, 60vw);
            height: min(400px, 60vw);
            background: rgba(16,185,129,0.12);
            bottom: -10%;
            right: -10%;
            animation-delay: 2s;
        }

        /* Logo container — scales with screen */
        .splash-center {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(16px, 4vw, 32px);
            animation: zoomIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        /* Icon mark */
        .splash-icon {
            width: clamp(90px, 22vw, 180px);
            height: clamp(90px, 22vw, 180px);
            background: linear-gradient(145deg, #6366f1, #8b5cf6, #10b981);
            border-radius: clamp(20px, 5vw, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 60px rgba(99,102,241,0.45),
                0 0 120px rgba(99,102,241,0.2);
            animation: iconFloat 3s ease-in-out 0.7s infinite alternate;
        }

        .splash-icon svg {
            width: 55%;
            height: 55%;
        }

        /* Wordmark */
        .splash-wordmark {
            font-size: clamp(32px, 10vw, 80px);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 20%, #a5b4fc 60%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2.5s linear 1s infinite;
            background-size: 200% auto;
        }

        .splash-sub {
            font-size: clamp(13px, 3vw, 18px);
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.5px;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        /* Animated progress dots */
        .splash-dots {
            display: flex;
            gap: 8px;
            margin-top: clamp(16px, 4vw, 32px);
            animation: fadeUp 0.4s 0.6s ease both;
        }
        .splash-dots span {
            width: clamp(7px, 1.5vw, 10px);
            height: clamp(7px, 1.5vw, 10px);
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .splash-dots span:nth-child(1) { animation: dotPulse 1.2s 0.0s ease-in-out infinite; }
        .splash-dots span:nth-child(2) { animation: dotPulse 1.2s 0.2s ease-in-out infinite; }
        .splash-dots span:nth-child(3) { animation: dotPulse 1.2s 0.4s ease-in-out infinite; }

        /* Bottom bar */
        .splash-progress-wrap {
            position: absolute;
            bottom: clamp(28px, 6vh, 60px);
            width: clamp(120px, 30vw, 200px);
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }
        .splash-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #10b981);
            border-radius: 99px;
            animation: progressFill 4.5s ease forwards;
        }

        /* ─────────────────────────────────────────
           AUTH LANDING  (shown when not logged in)
        ───────────────────────────────────────── */
        #auth-screen {
            display: none;
            min-height: 100vh;
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 5vw, 32px);
            background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 55%), #0c0c1d;
            animation: fadeIn 0.5s ease;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: clamp(28px, 7vw, 48px);
        }
        .auth-logo-icon {
            width: clamp(40px, 10vw, 52px);
            height: clamp(40px, 10vw, 52px);
            background: linear-gradient(135deg, #6366f1, #10b981);
            border-radius: clamp(10px, 3vw, 14px);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-logo-icon svg { width: 55%; height: 55%; }
        .auth-logo-text {
            font-size: clamp(22px, 6vw, 30px);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(24px, 6vw, 40px);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h1 {
            font-size: clamp(20px, 5.5vw, 28px);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-card p {
            color: rgba(255,255,255,0.45);
            font-size: clamp(13px, 3.5vw, 15px);
            margin-bottom: clamp(24px, 6vw, 36px);
            line-height: 1.6;
        }

        .btn-login {
            display: block;
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 12px;
            box-shadow: 0 5px 22px rgba(99,102,241,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(99,102,241,0.55); }

        .btn-signup {
            display: block;
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-signup:hover { background: rgba(255,255,255,0.1); }

        .auth-features {
            display: flex;
            gap: clamp(16px, 5vw, 28px);
            justify-content: center;
            margin-top: clamp(28px, 7vw, 48px);
            flex-wrap: wrap;
        }
        .auth-feature {
            text-align: center;
            color: rgba(255,255,255,0.38);
            font-size: clamp(11px, 3vw, 13px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .auth-feature-icon { 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* ── Keyframes ── */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.75) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes iconFloat {
            from { transform: translateY(0px); box-shadow: 0 0 60px rgba(99,102,241,0.45), 0 0 120px rgba(99,102,241,0.2); }
            to   { transform: translateY(-12px); box-shadow: 0 20px 80px rgba(99,102,241,0.55), 0 0 140px rgba(99,102,241,0.25); }
        }
        @keyframes pulse {
            from { opacity: 0.5; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.12); }
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        @keyframes dotPulse {
            0%,100% { background: rgba(255,255,255,0.2); transform: scale(1); }
            50%      { background: #a5b4fc; transform: scale(1.4); }
        }
        @keyframes progressFill {
            0%   { width: 0%; }
            70%  { width: 75%; }
            100% { width: 100%; }
        }

        /* ── 320px breakpoint ── */
        @media (max-width: 340px) {
            .auth-features { gap: 12px; }
            .auth-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- ── Splash ── -->
    <div id="splash">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="splash-center">
            <div class="splash-icon">
                <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" fill="rgba(255,255,255,0.1)"/>
                    <path d="M22 24h6c2.8 0 5 2.2 5 5s-2.2 5-5 5h-6V24z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 29h7c1.7 0 3 1.3 3 3s-1.3 3-3 3h-7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M30 20v3m0 14v3M20 30h-3m26 0h-3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="splash-wordmark">SpendWise</div>
            <p class="splash-sub">Smart financial tracking for Uganda</p>
            <div class="splash-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="splash-progress-wrap">
            <div class="splash-progress-bar"></div>
        </div>
    </div>

    <!-- ── Auth Landing ── -->
    <div id="auth-screen">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 60 60" fill="none">
                    <path d="M22 24h6c2.8 0 5 2.2 5 5s-2.2 5-5 5h-6V24z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 29h7c1.7 0 3 1.3 3 3s-1.3 3-3 3h-7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="auth-logo-text">SpendWise</span>
        </div>

        <div class="auth-card">
            <h1>Welcome back 
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; color:#f59e0b;">
                    <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path>
                    <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path>
                    <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path>
                    <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path>
                </svg>
            </h1>
            <p>Track your finances, set goals, and take full control of your money.</p>
            <a href="login.html" class="btn-login">Sign In</a>
            <a href="signup.html" class="btn-signup">Create Account</a>
        </div>

        <div class="auth-features">
            <div class="auth-feature">
                <span class="auth-feature-icon" style="background:transparent; display:block;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                </span>
                Reports
            </div>
            <div class="auth-feature">
                <span class="auth-feature-icon" style="background:transparent; display:block;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                </span>
                Goals
            </div>
            <div class="auth-feature">
                <span class="auth-feature-icon" style="background:transparent; display:block;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </span>
                SMS Sync
            </div>
            <div class="auth-feature">
                <span class="auth-feature-icon" style="background:transparent; display:block;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
                </span>
                AI Advice
            </div>
        </div>
    </div>

    <script>
        (function () {
            const SPLASH_MS = 5000;

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js')
                        .then((registration) => {
                            console.log('SW registered: ', registration);
                        })
                        .catch((registrationError) => {
                            console.log('SW registration failed: ', registrationError);
                        });
                });
            }

            function isLoggedIn() {
                return !!(localStorage.getItem('token') && localStorage.getItem('user'));
            }

            function hideSplash(then) {
                document.getElementById('splash').classList.add('fade-out');
                setTimeout(then, 620);
            }

            function showAuth() {
                document.getElementById('splash').style.display = 'none';
                const a = document.getElementById('auth-screen');
                a.style.display = 'flex';
            }

            setTimeout(function () {
                if (isLoggedIn()) {
                    hideSplash(function () { window.location.href = 'dashboard.html'; });
                } else {
                    hideSplash(showAuth);
                }
            }, SPLASH_MS);
        })();
    </script>
</body>
</html>
